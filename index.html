<style>
  :root {
    --bg-color: #0b0b0b;
    --accent-color: #ffffff;
    --text-dim: #888888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg-color);
    color: var(--accent-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Butterfly Styles */
  #butterfly {
    position: fixed;
    width: 40px;
    height: 40px;
    cursor: pointer;
    z-index: 9999;
    transition: left 2.5s ease-in-out, top 2.5s ease-in-out;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: auto;
  }

  .wing {
    width: 15px;
    height: 22px;
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.8);
    border-radius: 50% 50% 10% 50%;
    position: absolute;
    transform-origin: right center;
    animation: flap-left 0.15s infinite alternate ease-in-out;
  }

  .wing.right {
    border-radius: 50% 50% 50% 10%;
    transform-origin: left center;
    animation: flap-right 0.15s infinite alternate ease-in-out;
    left: 20px;
  }

  @keyframes flap-left {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(75deg); }
  }

  @keyframes flap-right {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(-75deg); }
  }

  .header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .static-flash {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://media.giphy.com/media/oEI9uWUicM3RK/giphy.gif') center/cover;
    opacity: 0.03;
    pointer-events: none;
    z-index: 1;
  }

  .artist-name {
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.05em;
    text-transform: lowercase;
    margin-bottom: 0.5rem;
    z-index: 2;
  }

  .status-line {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 1rem;
    z-index: 2;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: #ff3b30;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff3b30;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }

  .section {
    padding: 4rem 2rem;
    max-width: 1200px;
  }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-bottom: 2rem;
    display: block;
  }

  .about-text {
    font-size: clamp(1.2rem, 3vw, 2rem);
    max-width: 800px;
    color: #dfdfdf;
  }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-top: 2rem;
  }

  .link-card {
    border: 1px solid #222;
    padding: 1.5rem;
    text-decoration: none;
    color: var(--accent-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
    background: #111;
  }

  .link-card:hover {
    background: #fff;
    color: #000;
    border-color: #fff;
  }

  .link-dot {
    width: 4px;
    height: 4px;
    background: currentColor;
    border-radius: 50%;
  }

  footer {
    padding: 4rem 2rem;
    border-top: 1px solid #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    color: var(--text-dim);
    font-size: 0.75rem;
  }

  .footer-name {
    font-weight: 700;
    color: #444;
    font-size: 1.5rem;
  }

  @media (max-width: 600px) {
    footer { flex-direction: column; align-items: flex-start; gap: 2rem; }
  }
</style>
</head>

<script>
  // Counter logic
  let secs = 0;
  setInterval(() => {
    secs++;
    const h = String(Math.floor(secs/3600)).padStart(2,'0');
    const m = String(Math.floor((secs%3600)/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    const counterEl = document.getElementById('counter');
    if(counterEl) counterEl.textContent = h+':'+m+':'+s;
  }, 1000);

  // Butterfly Logic
  const bf = document.getElementById('butterfly');
  
  function moveButterfly() {
    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);
    bf.style.left = x + 'px';
    bf.style.top = y + 'px';
  }

  // Rare movement: moves every 4 seconds
  moveButterfly(); 
  setInterval(moveButterfly, 4000);

  // Reveal track on click
  bf.addEventListener('click', (e) => {
    e.stopPropagation();
    alert("You caught it. The hidden track is: 'isolation'");
    bf.style.display = 'none';
  });

  // Remove static flash after a few seconds for performance
  setTimeout(() => { 
    const f = document.querySelector('.static-flash'); 
    if(f) f.remove(); 
  }, 8000);
</script>
